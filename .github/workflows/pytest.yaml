name: Pytest CI

on:
  push:
    branches: [version-14, version-15]
  pull_request:
    branches: [version-14, version-15]

env:
  BRANCH_NAME: ${{ github.base_ref || github.ref_name }}

jobs:
  tests:
    runs-on: ubuntu-latest
    name: Server

    services:
      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: YES
          MYSQL_ROOT_PASSWORD: admin
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=5s --health-timeout=2s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: yarn

      - name: Add to hosts
        run: echo "127.0.0.1 test_site" | sudo tee -a /etc/hosts

      - name: Install app dependencies
        run: bash ${{ github.workspace }}/.github/helper/install_dependencies.sh

      - name: Install bench and apps
        env:
          MYSQL_HOST: localhost
          MYSQL_PWD: admin
          BRANCH_NAME: ${{ env.BRANCH_NAME }}
        run: bash ${{ github.workspace }}/.github/helper/install.sh

      - name: Run tests
        working-directory: /home/runner/frappe-bench
        run: |
          source env/bin/activate
          pytest apps/taxjar_erpnext/ --disable-warnings -s -v
